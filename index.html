<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How was lunch?</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #0d1b3e;
      --bg2:  #112050;
      --text: #ffffff;
      --muted:#6b82b8;
      --c1: #ff6b6b;
      --c2: #ffa94d;
      --c3: #ffe066;
      --c4: #69db7c;
      --c5: #4dabf7;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      user-select: none;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 90%, rgba(74,144,226,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 85% 10%, rgba(100,60,180,0.14) 0%, transparent 65%);
      pointer-events: none;
    }

    .star {
      position: fixed;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.08; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(1.5); }
    }

    /* ── Layout shell ── */
    .shell {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(20px, 4vw, 64px) clamp(16px, 4vw, 64px);
    }

    /* ── Logo ── */
    .logo {
      align-self: flex-end;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
      z-index: 10;
      order: 3;
    }

    .logo img {
      height: clamp(36px, 5vw, 68px);
      width: auto;
      filter: brightness(0) invert(1);
    }

    /* ── Title ── */
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 5vw, 78px);
      letter-spacing: -0.03em;
      color: var(--text);
      text-align: center;
      order: 1;
      animation: fadeDown 0.7s cubic-bezier(0.22,1,0.36,1) both, titleWobble 4s 1s ease-in-out infinite;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes titleWobble {
      0%,100% { transform: rotate(0deg) scale(1); }
      25%      { transform: rotate(-0.6deg) scale(1.01); }
      75%      { transform: rotate(0.6deg) scale(1.01); }
    }

    /* ── Faces ── */
    .faces {
      order: 2;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2vw, 60px);
      animation: fadeUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
      width: 100%;
      padding: 0 clamp(8px, 2vw, 32px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .face-btn {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: clamp(16px, 2.5vw, 32px);
      cursor: pointer;
      padding: clamp(16px, 3vw, 40px) clamp(14px, 2.5vw, 36px) clamp(12px, 2.5vw, 32px);
      width: clamp(110px, 16vw, 220px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.8vw, 22px);
      outline: none;
      -webkit-tap-highlight-color: transparent;
      /* No transition on border/background at base level — hover handles it */
      transition: opacity 0.2s;
      backdrop-filter: blur(4px);
    }

    .face-btn.hide {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .face-btn.show {
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.5s;
    }

    .emoji {
      font-size: clamp(48px, 9vw, 112px);
      line-height: 1;
      display: block;
      animation: float 3.6s ease-in-out infinite;
      will-change: transform;
    }

    .face-btn:nth-child(1) .emoji { animation-duration: 3.4s; animation-delay: 0.0s; }
    .face-btn:nth-child(2) .emoji { animation-duration: 3.8s; animation-delay: 0.5s; }
    .face-btn:nth-child(3) .emoji { animation-duration: 3.2s; animation-delay: 1.1s; }
    .face-btn:nth-child(4) .emoji { animation-duration: 3.7s; animation-delay: 0.3s; }
    .face-btn:nth-child(5) .emoji { animation-duration: 3.5s; animation-delay: 0.8s; }

    @keyframes float {
      0%   { transform: translateY(0px)   rotate(0deg); }
      30%  { transform: translateY(-10px) rotate(-2.5deg); }
      60%  { transform: translateY(-5px)  rotate(2deg); }
      100% { transform: translateY(0px)   rotate(0deg); }
    }

    /* ── Hover styles: ONLY on devices that actually support hover ── */
    @media (hover: hover) {
      .face-btn {
        transition: border-color 0.18s, background 0.18s, opacity 0.2s;
      }

      .face-btn:hover .emoji {
        animation-play-state: paused;
        transform: translateY(-20px) scale(1.18) rotate(-4deg) !important;
      }

      .face-btn[data-r="1"]:hover { border-color: var(--c1); background: rgba(255,107,107,0.1); }
      .face-btn[data-r="2"]:hover { border-color: var(--c2); background: rgba(255,169,77,0.1); }
      .face-btn[data-r="3"]:hover { border-color: var(--c3); background: rgba(255,224,102,0.1); }
      .face-btn[data-r="4"]:hover { border-color: var(--c4); background: rgba(105,219,124,0.1); }
      .face-btn[data-r="5"]:hover { border-color: var(--c5); background: rgba(77,171,247,0.1); }

      .face-btn:hover .label { transform: scale(1.1); }
      .face-btn[data-r="1"]:hover .label { color: var(--c1); }
      .face-btn[data-r="2"]:hover .label { color: var(--c2); }
      .face-btn[data-r="3"]:hover .label { color: var(--c3); }
      .face-btn[data-r="4"]:hover .label { color: var(--c4); }
      .face-btn[data-r="5"]:hover .label { color: var(--c5); }
    }

    /* ── Active / tap feedback (safe for touch — doesn't stick) ── */
    .face-btn:active .emoji {
      animation-play-state: paused;
      transform: scale(0.88) !important;
    }

    .label {
      font-size: clamp(9px, 1.3vw, 17px);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      transition: color 0.18s, transform 0.18s;
    }

    /* ── Burst ── */
    #burst {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 100;
    }

    #burstEmoji {
      font-size: clamp(100px, 20vw, 280px);
      line-height: 1;
      opacity: 0;
      transform: scale(0.2);
    }

    #burstEmoji.pop    { animation: bigPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    #burstEmoji.spin   { animation: spinPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    #burstEmoji.shrink { animation: shrinkOut 0.4s ease-in forwards; }

    @keyframes bigPop {
      0%   { opacity: 0; transform: scale(0.1) rotate(-15deg); }
      60%  { opacity: 1; transform: scale(1.18) rotate(5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes spinPop {
      0%   { opacity: 0; transform: scale(0.1) rotate(-180deg); }
      60%  { opacity: 1; transform: scale(1.2) rotate(15deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes shrinkOut {
      0%   { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.3) rotate(20deg) translateY(-60px); }
    }

    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 99;
    }

    .ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 98;
      animation: ringOut 0.7s ease-out forwards;
    }
    @keyframes ringOut {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    .bonus {
      position: fixed;
      pointer-events: none;
      z-index: 97;
      animation: floatUp linear forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) rotate(40deg) scale(0.5); }
    }

    /* ── Portrait / small screens: stack faces in a grid ── */
    @media (max-width: 600px) {
      .faces {
        gap: 10px;
      }
      .face-btn {
        width: calc(30vw);
        min-width: 90px;
        max-width: 150px;
      }
    }
  </style>
</head>
<body>

  <div class="shell">
    <h1>How was lunch today?</h1>

    <div class="faces">
      <button class="face-btn" data-r="1" onclick="go(1)">
        <span class="emoji">😢</span>
        <span class="label">TERRIBLE</span>
      </button>
      <button class="face-btn" data-r="2" onclick="go(2)">
        <span class="emoji">😕</span>
        <span class="label">NOT YUMMY</span>
      </button>
      <button class="face-btn" data-r="3" onclick="go(3)">
        <span class="emoji">😐</span>
        <span class="label">OKAY</span>
      </button>
      <button class="face-btn" data-r="4" onclick="go(4)">
        <span class="emoji">😊</span>
        <span class="label">YUMMY</span>
      </button>
      <button class="face-btn" data-r="5" onclick="go(5)">
        <span class="emoji">😄</span>
        <span class="label">DELICIOUS</span>
      </button>
    </div>

    <!-- School logo -->
    <div class="logo">
      <img src="https://www.infinity-gakuin.jp/img/base/logo_wh.svg" alt="Infinity Global Elementary School" />
    </div>
  </div>

  <div id="burst"><span id="burstEmoji"></span></div>

<script>
  const emojis  = ['😢','😕','😐','😊','😄'];
  const colors  = ['#ff6b6b','#ffa94d','#ffe066','#69db7c','#4dabf7'];
  const bonusEmojis = {
    1: ['💧','😿','🌧️','😭'],
    2: ['😶','💭','🤷'],
    3: ['⭐','👍','🙂'],
    4: ['✨','🎉','💛','👏'],
    5: ['🎊','🌟','🔥','💥','🎈','🥳','⚡','🌈']
  };
  let busy = false;

  // Twinkling stars
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1.5 + Math.random() * 3;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*5}s;
    `;
    document.body.appendChild(s);
  }

  function go(rating) {
    if (busy) return;
    busy = true;

    document.querySelectorAll('.face-btn').forEach(btn => {
      btn.classList.remove('show');
      btn.classList.add('hide');
      btn.blur();
    });

    fetch("https://script.google.com/macros/s/AKfycbzmtH6CpaCS-x3Doyx9IkJzaYFkvMDZbXr5H1x0xL_ISvFNrnpDVKeg6d1e3767rnirVw/exec?rating=" + rating)
      .finally(() => { busy = false; });

    showBurst(rating);

    setTimeout(() => {
      document.querySelectorAll('.face-btn').forEach(btn => {
        btn.classList.remove('hide');
        btn.classList.add('show');
      });
    }, 1600);
  }

  function showBurst(rating) {
    const el = document.getElementById('burstEmoji');
    el.textContent = emojis[rating - 1];
    el.className = '';
    void el.offsetWidth;
    el.className = rating === 5 ? 'spin' : 'pop';

    spawnRings(rating);
    spawnConfetti(rating);
    spawnBonusEmojis(rating);

    setTimeout(() => {
      el.className = 'shrink';
      setTimeout(() => { el.className = ''; }, 400);
    }, 1000);
  }

  function spawnRings(rating) {
    const count = rating >= 4 ? 3 : 2;
    const maxSize = Math.min(window.innerWidth, window.innerHeight);
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const r = document.createElement('div');
        r.className = 'ring';
        const size = (maxSize * 0.25) + i * (maxSize * 0.25);
        r.style.cssText = `
          width:${size}px; height:${size}px;
          left:50%; top:50%;
          border: 4px solid ${colors[rating-1]};
          animation-duration:${0.55 + i * 0.12}s;
        `;
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 800);
      }, i * 80);
    }
  }

  function spawnConfetti(rating) {
    const count = rating === 5 ? 90 : rating === 4 ? 55 : rating === 3 ? 28 : 14;
    const palette = [colors[rating-1], '#ffffff', '#cce8ff', colors[Math.max(0,rating-2)]];
    const spread = Math.min(window.innerWidth, window.innerHeight) * 0.9;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 7 + Math.random() * 14;
        const dur  = 0.9 + Math.random() * 1.3;
        p.style.cssText = `
          left:50%; top:50%;
          width:${size}px; height:${size * (0.4 + Math.random() * 0.8)}px;
          background:${palette[i % palette.length]};
          border-radius:${Math.random() > 0.5 ? '50%' : '3px'};
        `;
        p.animate([
          { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
          { transform: `translate(calc(-50% + ${(Math.random()-0.5)*spread}px), calc(-50% + ${(Math.random()-0.5)*spread}px)) rotate(${Math.random()*720}deg)`, opacity: 0 }
        ], { duration: dur * 1000, easing: 'cubic-bezier(0.2,0.8,0.4,1)', fill: 'forwards' });
        document.body.appendChild(p);
        setTimeout(() => p.remove(), dur * 1000 + 100);
      }, i * 10);
    }
  }

  function spawnBonusEmojis(rating) {
    const pool  = bonusEmojis[rating];
    const count = rating >= 4 ? 10 : rating === 3 ? 5 : 4;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const b = document.createElement('div');
        b.className = 'bonus';
        b.textContent = pool[Math.floor(Math.random() * pool.length)];
        const dur = 1.2 + Math.random() * 1.0;
        b.style.cssText = `
          left:${10 + Math.random() * 80}%;
          top:${20 + Math.random() * 55}%;
          font-size:${clamp(24, window.innerWidth * 0.05, 60)}px;
          animation-duration:${dur}s;
          animation-delay:${Math.random() * 0.3}s;
        `;
        document.body.appendChild(b);
        setTimeout(() => b.remove(), (dur + 0.4) * 1000);
      }, i * 90);
    }
  }

  function clamp(min, val, max) {
    return Math.min(Math.max(val, min), max);
  }

  async function keepAwake() {
    try {
      await navigator.wakeLock.request('screen');
    } catch (e) {
      // silently fail if not supported
    }
  }

  keepAwake();

  // Wake lock releases when app goes to background, so re-acquire when it comes back
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
</script>

</body>
</html>
